name: release-xz

# Repackage the per-year TSV + index.tsv as xz-compressed release
# assets. Only files that have changed since the last packaged commit
# (tracked by the `data-packaged` git tag) are re-uploaded, so a
# typical day uploads 1-2 files instead of all 28.
#
# Repo layout:
#   .x-cmd/tsv.py, _cve_index.py, delta_update.py   ← scripts (this dir)
#   data/cve-YYYY.tsv, index.tsv, cve.tsv.state.json ← per-year TSVs
#
# NB: NO .xz files are committed to the main branch — binaries belong
# in release assets, not source. data/cve-*.tsv is also untracked
# (regenerated on every CI run).

on:
  schedule:
    - cron: "37 2 * * *"   # 02:37 UTC daily; off-the-hour to spread load
  workflow_dispatch:
  workflow_run:
    workflows: ["delta-update"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-xz
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so `git diff <prev>..HEAD` can compare
          # against the previous packaged commit.
          fetch-depth: 0

      - name: Install xz
        run: |
          command -v xz && xz --version
          # xz-utils is preinstalled on ubuntu-latest; this is just a guard.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # Run the producer so data/cve-YYYY.tsv + data/index.tsv are
      # up-to-date before we package them. The script writes into
      # ./data/ by default and is dependency-free (Python stdlib only).
      # ----------------------------------------------------------------
      - name: Run producer
        run: |
          mkdir -p data
          # delta_update.py does the incremental fetch against the
          # upstream deltaLog — much cheaper than rebuilding from
          # scratch.
          python3 .x-cmd/delta_update.py 2>&1 | tail -20 || \
            python3 .x-cmd/tsv.py --rebuild 2>&1 | tail -20

      # ----------------------------------------------------------------
      # Build cve.report.tsv + cve.report.md from the freshly-updated
      # data/. The markdown file is what gets inlined into the README
      # on the next step.
      # ----------------------------------------------------------------
      - name: Generate CWE catalog TSV
        # Fetch MITRE 2000.csv.zip, parse, write data/cwe.tsv.
        # 30-day TTL — the CWE catalog changes slowly. The x-cwe
        # module reads the upstream catalog on its own at runtime;
        # this file gives the cve repo a stable, snapshot-able copy
        # for linking CWE ids to names in our docs / report.
        run: |
          python3 .x-cmd/cwe.py

      - name: Generate CWE cross-reference report
        # For every CWE in the catalog, count how many CVEs in our
        # data/ reference it, plus avg / max score. Output goes into
        # data/cwe.report.tsv — derived aggregates only, never a copy
        # of MITRE's catalog.
        run: |
          python3 .x-cmd/cwe_report.py

      - name: Generate year stats report
        run: |
          python3 .x-cmd/report.py

      - name: Inline report into README
        run: |
          python3 - <<'PY'
          from pathlib import Path
          # cve.report.md is a bare markdown table (no BEGIN/END markers).
          # We add them here when stitching into README.md.
          md = Path("data/cve.report.md").read_text(encoding="utf-8").rstrip() + "\n"
          readme = Path("README.md").read_text(encoding="utf-8")
          begin = "<!-- BEGIN cve.report.md -->"
          end   = "<!-- END cve.report.md -->"
          block = (
              f"{begin}\n\n"
              f"*Auto-generated by `.x-cmd/report.py`. Updated daily.*\n\n"
              f"{md}"
              f"{end}\n"
          )
          if begin in readme and end in readme:
              i, j = readme.index(begin), readme.index(end) + len(end)
              new_readme = readme[:i] + block + readme[j:]
          else:
              anchor = "## Repository layout"
              new_readme = readme.replace(anchor, block + anchor, 1)
          Path("README.md").write_text(new_readme, encoding="utf-8")
          print("inlined report into README.md")
          PY
          git diff --stat README.md || true

      # ----------------------------------------------------------------
      # Detect which .tsv files have actually changed since the last
      # packaged commit. Skipping unchanged files keeps the release
      # workflow O(changes-per-day) instead of O(years).
      # ----------------------------------------------------------------
      - name: Find previous packaged commit
        id: prev
        run: |
          PREV=$(git rev-list -n 1 data-packaged 2>/dev/null || echo "")
          echo "prev=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Detect changed .tsv files
        id: changed
        run: |
          # We package cve-YYYY.tsv + cwe.tsv + cwe.slim.tsv. Skip
          # index.tsv (no consumer) and the *report.tsv files
          # (regenerated by the workflow itself; they're not the
          # source of truth — the per-year cve-*.tsv is).
          if [ -n "${{ steps.prev.outputs.prev }}" ]; then
              git diff --name-only "${{ steps.prev.outputs.prev }}"..HEAD \
                  -- 'data/cve-*.tsv' 'data/cwe.tsv' 'data/cwe.slim.tsv' \
                  | sed 's#^data/##' \
                  | sort -u > changed.txt
          else
              # First run ever — upload everything.
              ls data/cve-*.tsv data/cwe.tsv data/cwe.slim.tsv 2>/dev/null \
                  | sed 's#^data/##' \
                  | sort -u > changed.txt
          fi
          echo "Files changed since last release:"
          cat changed.txt
          echo "changed_count=$(wc -l < changed.txt)" >> "$GITHUB_OUTPUT"

      - name: Compress changed files
        if: steps.changed.outputs.changed_count != '0'
        # xz -9 = best compression; per-year TSV shrinks ~85%.
        # -k keeps the .tsv on disk so the workflow doesn't accidentally
        # delete source files.
        run: |
          mkdir -p release
          while IFS= read -r f; do
              [ -f "data/$f" ] || continue
              xz -9 -k -c "data/$f" > "release/${f}.xz"
          done < changed.txt
          echo "--- compressed ---"
          ls -lh release/

      # ----------------------------------------------------------------
      # Build a single cve-all.tar.xz that bundles every per-year TSV
      # (not the .xz — plain TSVs inside the tar, then tar gets xz'd).
      # Consumers can fetch this one file and have the full mirror,
      # vs. fetching each cve-YYYY.tsv.xz individually.
      #
      # We rebuild it on every run regardless of changed_count — the
      # bundle is a snapshot, not an incremental artefact.
      # ----------------------------------------------------------------
      - name: Build cve-all.tar.xz
        run: |
          mkdir -p release
          # Tar every data/cve-*.tsv into a plain tar, then xz it.
          # We have to expand the glob BEFORE tar changes directory
          # (otherwise `cve-*.tsv` resolves against the post-`-C`
          # directory and finds nothing). Pass the explicit list of
          # absolute paths to tar, which it then strips via the -C.
          tar -C data -cf - $(cd data && echo cve-*.tsv) | xz -9 -e > release/cve-all.tar.xz
          ls -lh release/cve-all.tar.xz

      # ----------------------------------------------------------------
      # Ensure the `data` release exists (first run creates it), then
      # for each changed file: delete the existing asset (if any) and
      # upload the new .xz. The release URL for each asset is stable,
      # so consumers see no churn.
      # ----------------------------------------------------------------
      - name: Ensure 'data' release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view data >/dev/null 2>&1; then
              echo "Creating 'data' release (first run)..."
              gh release create data \
                  --title "data" \
                  --notes "xz-compressed CVE index (auto-generated daily)." \
                  --draft
              # Release starts as draft; assets added below; we publish
              # at the very end so consumers never see a half-built
              # release.
          fi

      - name: Replace changed assets
        if: steps.changed.outputs.changed_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r f; do
              [ -f "release/${f}.xz" ] || continue
              # Delete existing asset (if any) so the upload replaces it.
              gh release delete-asset data "${f}.xz" --yes 2>/dev/null || true
              echo "Uploading ${f}.xz"
              gh release upload data "release/${f}.xz" --clobber
          done < changed.txt

      - name: Upload cve-all.tar.xz
        # Always re-upload the bundle — it's a snapshot of the entire
        # data/ tree, so any change in any year file means a stale
        # bundle. Delete-first-then-upload so we replace atomically.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [ -f release/cve-all.tar.xz ] || {
              echo "release/cve-all.tar.xz missing — skipping"
              exit 0
          }
          gh release delete-asset data cve-all.tar.xz --yes 2>/dev/null || true
          echo "Uploading cve-all.tar.xz"
          gh release upload data release/cve-all.tar.xz --clobber

      - name: Publish the release
        if: steps.changed.outputs.changed_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If it was created as a draft above, promote it. Idempotent.
          gh release edit data --draft=false || true

      # ----------------------------------------------------------------
      # Move the data-packaged tag to the current commit so the next
      # run can diff against it. Force-push because tags are
      # deliberately mutable here (that's the whole point).
      # ----------------------------------------------------------------
      - name: Move data-packaged tag to current commit
        if: steps.changed.outputs.changed_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f data-packaged HEAD
          git push origin data-packaged --force

      - name: Cleanup
        if: always()
        run: rm -rf release changed.txt